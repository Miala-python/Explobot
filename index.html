<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Python Mobile Final</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

    <style>
        body { 
            margin: 0; padding: 0; background: #f0f2f5;
            display: flex; flex-direction: column; align-items: center;
            font-family: system-ui, sans-serif;
        }

        #loading-screen {
            position: fixed; inset: 0; background: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 10000; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .app-wrapper {
            width: 100%; max-width: 500px;
            padding: 10px; box-sizing: border-box;
        }

        /* CONTENEUR MATPLOTLIB */
        div[style*="inline-block"], .pyscript-visual-output {
            width: 100% !important;
            height: auto !important;
            display: flex !important;
            flex-direction: column !important;
            background: white !important;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden !important;
        }

        /* LE FIX DU NOIR : On force le canvas à remplir l'espace imparti */
        canvas {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 1 / 1; 
            display: block !important;
            image-rendering: pixelated; /* Optionnel : garde les pixels nets pour du 50x50 */
        }

        .mpl-toolbar {
            width: 100% !important;
            display: flex !important;
            justify-content: center !important;
            background: #fafafa !important;
            border-top: 1px solid #ddd !important;
            padding: 10px 0 !important;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top:15px; color:#2563eb">Initialisation du graphique...</p>
    </div>

    <div class="app-wrapper">
        <h1 style="font-size: 1.1rem; text-align: center;">Ma Simulation Python</h1>
        <script type="py" config="./pyscript.json" src="./main.py"></script>
    </div>

    <script>
        const observer = new MutationObserver((mutations, obs) => {
            const canvas = document.querySelector('canvas');
            if (canvas) {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    // Petit délai pour laisser le premier frame s'afficher
                    setTimeout(() => {
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            loader.remove();
                            // TRÈS IMPORTANT : On simule un resize et un clic 
                            // pour forcer le moteur d'animation à sortir du noir
                            window.dispatchEvent(new Event('resize'));
                            canvas.click(); 
                        }, 500);
                    }, 1000);
                }
                obs.disconnect();
            }
        });

        observer.observe(document.body, { childList: true, subtree: true });
    </script>

</body>
</html>
