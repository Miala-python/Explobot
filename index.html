<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Mobile Fix</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        
        /* 1. LOADING SCREEN */
        #loading-screen {
            position: fixed; inset: 0; background: white; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 10000; transition: opacity 0.4s;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #3b82f6; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        /* 2. FORCE RESPONSIVE (Le secret est le sélecteur universel sur les enfants de body) */
        body > div[style*="inline-block"], 
        .pyscript-visual-output,
        div[class*="mpl"] {
            width: 100% !important;
            max-width: 100vw !important;
            height: auto !important;
            display: block !important;
            box-sizing: border-box !important;
        }

        /* On cible spécifiquement le conteneur interne de 800px vu sur ta capture */
        div[style*="width: 800px"] {
            width: 100% !important;
            height: auto !important;
            min-width: 0 !important;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
        }

        /* On cache la toolbar Matplotlib si elle dépasse trop ou on la rend scrollable */
        .mpl-toolbar { overflow-x: auto; width: 100%; display: flex; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Chargement du graphique...</p>
    </div>

    <h1 style="font-size: 1.1rem; margin: 15px;">Dashboard Mobile</h1>

    <script type="py" config="./pyscript.json" src="./main.py"></script>

    <script>
        // Observation du DOM pour détecter quand Matplotlib injecte le graphique
        const observer = new MutationObserver((mutations, obs) => {
            // Si on voit un élément avec la classe mpl-toolbar ou un canvas, c'est que c'est prêt
            if (document.querySelector('canvas') || document.querySelector('.mpl-toolbar')) {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 400);
                }
                obs.disconnect(); // On arrête d'observer
            }
        });

        observer.observe(document.body, { childList: true, subtree: true });
        
        // Sécurité si jamais l'observer rate
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) loader.remove();
            }, 8000); 
        });
    </script>
</body>
</html>
