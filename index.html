<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Mobile Web</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

    <style>
        :root { --primary: #2563eb; }
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, system-ui, sans-serif;
            background: #f8fafc;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 1. ÉCRAN DE CHARGEMENT */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        /* PyScript cache automatiquement cet élément quand il a fini si on utilise sa classe */
        .py-loading #loading-screen { display: flex; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. RESPONSIVE DESIGN SANS TOUCHER AU PYTHON */
        .app-container {
            width: 100%; max-width: 800px; padding: 10px;
            box-sizing: border-box; text-align: center;
        }

        /* Cible le conteneur injecté par Matplotlib */
        div.pyscript-visual-output, 
        div[style*="inline-block"],
        .mpl-container {
            width: 100% !important;
            height: auto !important;
            display: block !important;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }

        /* Force le Canvas à être responsive */
        canvas {
            width: 100% !important;
            height: auto !important;
            max-width: 100%;
        }

        /* Cache les messages d'erreur/warnings système moches */
        .py-error, .py-warning { 
            max-width: 90%; margin: 10px auto; font-size: 12px; 
        }
    </style>
</head>
<body class="py-loading">

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #64748b;">Initialisation de Python...</p>
    </div>

    <div class="app-container">
        <h1 style="font-size: 1.25rem;">Mon Application Python</h1>
        
        <script type="py" config="./pyscript.json" src="./main.py"></script>
    </div>

    <script>
        // Sécurité pour enlever l'écran de chargement même si PyScript tarde
        // 'py-finished' est un événement envoyé par PyScript
        document.addEventListener('py-finished', () => {
            const loader = document.getElementById('loading-screen');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
        });
    </script>

</body>
</html>
